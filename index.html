<!DOCTYPE html>
<html>
<head>
  <title>AI Dental Receptionist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:Arial;
      text-align:center;
      margin-top:120px;
      background:#f5f5f5;
    }

    button{
      padding:15px 30px;
      font-size:18px;
      background:#2b7cff;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#1a5ed8;
    }
  </style>

</head>

<body>

<h1>AI Dental Receptionist</h1>

<p>Talk to our AI receptionist that books appointments automatically.</p>

<button id="callBtn">Talk to AI Receptionist</button>

<script type="module">

import Vapi from "https://cdn.jsdelivr.net/npm/@vapi-ai/web/+esm";

const vapi = new Vapi("81e1fcc2-7045-4461-863f-f8eaa3553bd1");

document.getElementById("callBtn").addEventListener("click", () => {
  vapi.start("229f6c0d-1f90-41c2-a91b-e3481e1de72a");
});

</script>

</body>
</html>
